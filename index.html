<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="クローゼット">
  <meta name="theme-color" content="#C17F8E">
  <title>クローゼット管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="app.css?v=24">
  <style>
    /* inline to bypass CSS cache */
    .screen { height: 100% !important; }
    .bottom-nav {
      position: fixed !important;
      bottom: 0 !important; left: 0 !important; right: 0 !important;
      padding-bottom: env(safe-area-inset-bottom, 0px) !important;
    }
    .nav-item { height: 50px !important; }
    .scroll-body { padding-bottom: calc(50px + env(safe-area-inset-bottom, 0px) + 20px) !important; }
    .fab { bottom: calc(50px + env(safe-area-inset-bottom, 0px) + 16px) !important; }
  </style>
</head>
<body>
  <div id="root">
    <div class="splash">
      <div class="splash-icon">👗</div>
      <p class="splash-title">クローゼット管理</p>
    </div>
  </div>
  <script src="db.js?v=23"></script>
  <script src="app.js?v=24"></script>
</body>
</html>
